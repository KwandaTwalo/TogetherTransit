spring.application.name=TogetherTransit
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/togetherTransitDB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password@1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.servlet.context-path=/togetherTransit
server.port=8080

# ===== LOGGING CONFIGURATION =====
# Set logging level for Spring Framework
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.validation=DEBUG

# Set logging level for your application package
logging.level.com.kwndtwalo.TogetherTransit=DEBUG

# Log SQL queries and parameters
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log request/response details
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE